services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: peoplecount
      POSTGRES_PASSWORD: peoplecount
      POSTGRES_DB: peoplecount
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peoplecount"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
